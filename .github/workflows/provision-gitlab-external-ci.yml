name: Provision GitLab External CI

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitLab project for external CI/CD
        uses: actions/github-script@v7
        env:
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_ORG_SUBGROUP:       ${{ secrets.GITLAB_ORG_SUBGROUP }}
          HOOK_TOKEN:                ${{ secrets.HOOK_TOKEN }}
          MIRROR_USERNAME:           ${{ secrets.MIRROR_USERNAME }}
          MIRROR_TOKEN:              ${{ secrets.MIRROR_TOKEN }}
        with:
          script: |
            // CONFIG — update if the central-workflows repo is renamed/moved
            const CENTRAL_REPO   = "central-workflows";
            const CENTRAL_BRANCH = "main";
            const CENTRAL_OWNER  = context.repo.owner;

            const GITLAB_HOST        = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN   = process.env.GITLAB_API_TOKEN;
            const TOP_LEVEL_GROUP_ID = process.env.GITLAB_TOP_LEVEL_GROUP_ID;
            const ORG_SUBGROUP       = process.env.GITLAB_ORG_SUBGROUP;
            const HOOK_TOKEN         = process.env.HOOK_TOKEN;
            const MIRROR_USERNAME    = process.env.MIRROR_USERNAME;
            const MIRROR_TOKEN       = process.env.MIRROR_TOKEN;

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;

            console.log("----- GitLab External CI Provisioning Started -----");
            console.log("Repo:", repoFullName);

            if (!MIRROR_TOKEN) {
              core.setFailed("MIRROR_TOKEN secret is required to register the GitHub webhook.");
              return;
            }

            // ─── 1. Read topics ────────────────────────────────────────────────
            const { data: topicData } = await github.rest.repos.getAllTopics({
              owner: context.repo.owner,
              repo:  context.repo.repo
            });

            const topics = topicData.names;
            console.log("Topics found:", topics);

            function extractTopic(prefix) {
              const match = topics.find(t => t.startsWith(`${prefix}-`));
              return match ? match.slice(prefix.length + 1) : null;
            }

            const product = extractTopic("product");
            const aspect  = extractTopic("aspect");
            const name    = extractTopic("repo");
            const tenant  = extractTopic("tenant");

            if (!product || !aspect || !name) {
              core.setFailed(`Could not extract required topics. Found: ${topics.join(", ")}`);
              return;
            }

            console.log(`Product : ${product}`);
            console.log(`Aspect  : ${aspect}`);
            console.log(`Name    : ${name}`);
            console.log(`Tenant  : ${tenant ?? "none"}`);

            const { data: repoData } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo:  context.repo.repo
            });
            const defaultBranch = repoData.default_branch ?? "main";

            console.log(`Default branch: ${defaultBranch}`);

            // ─── 2. GitLab API helpers ─────────────────────────────────────────
            async function readApiBody(res) {
              const text = await res.text();
              if (!text) return null;

              try {
                return JSON.parse(text);
              } catch {
                return text;
              }
            }

            async function glFetch(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN": GITLAB_API_TOKEN,
                  "Content-Type":  "application/json"
                },
                ...(body ? { body: JSON.stringify(body) } : {})
              });

              if (res.status === 204) return null;

              const data = await readApiBody(res);
              if (!res.ok) {
                throw new Error(`GitLab API [${method} ${path}] → ${res.status}: ${JSON.stringify(data)}`);
              }
              return data;
            }

            async function glFormFetch(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN": GITLAB_API_TOKEN
                },
                body: new URLSearchParams(body)
              });

              if (res.status === 204) return null;

              const data = await readApiBody(res);
              if (!res.ok) {
                throw new Error(`GitLab API [${method} ${path}] → ${res.status}: ${JSON.stringify(data)}`);
              }
              return data;
            }

            async function upsertProjectVariable(projectId, key, value, extra = {}) {
              try {
                await glFetch("PUT", `/projects/${projectId}/variables/${encodeURIComponent(key)}`, {
                  value,
                  ...extra
                });
                console.log(`  Updated project variable: ${key}`);
              } catch (err) {
                if (!String(err.message).includes("404")) throw err;

                await glFetch("POST", `/projects/${projectId}/variables`, {
                  key,
                  value,
                  ...extra
                });
                console.log(`  Created project variable: ${key}`);
              }
            }

            async function upsertRepositoryFile(projectId, branch, filePath, content, commitMessage) {
              const encodedPath = encodeURIComponent(filePath);

              function isMissingFileError(message) {
                return message.includes("404") || message.includes("A file with this name doesn't exist");
              }

              try {
                await glFetch(
                  "PUT",
                  `/projects/${projectId}/repository/files/${encodedPath}`,
                  {
                    branch,
                    content,
                    commit_message: commitMessage
                  }
                );
                console.log(`  Updated GitLab file: ${filePath}`);
              } catch (err) {
                if (!isMissingFileError(String(err.message))) throw err;

                await glFetch(
                  "POST",
                  `/projects/${projectId}/repository/files/${encodedPath}`,
                  {
                    branch,
                    content,
                    commit_message: commitMessage
                  }
                );
                console.log(`  Created GitLab file: ${filePath}`);
              }
            }

            async function fetchCentralFile(filePath) {
              const { data } = await github.rest.repos.getContent({
                owner: CENTRAL_OWNER,
                repo:  CENTRAL_REPO,
                path: filePath,
                ref:   CENTRAL_BRANCH
              });

              if (!("content" in data) || !data.content) {
                throw new Error(
                  `GitHub content API returned no file content for ` +
                  `${CENTRAL_OWNER}/${CENTRAL_REPO}/${filePath}@${CENTRAL_BRANCH}`
                );
              }

              return Buffer.from(data.content, "base64").toString("utf8");
            }

            async function ghFetch(method, path, body) {
              const hookToken = HOOK_TOKEN || MIRROR_TOKEN;

              const res = await fetch(`https://api.github.com${path}`, {
                method,
                headers: {
                  "Authorization":        `Bearer ${hookToken}`,
                  "Accept":               "application/vnd.github+json",
                  "Content-Type":         "application/json",
                  "X-GitHub-Api-Version": "2022-11-28"
                },
                ...(body ? { body: JSON.stringify(body) } : {})
              });

              if (res.status === 204) return null;

              const data = await readApiBody(res);
              if (!res.ok) {
                if (res.status === 401) {
                  throw new Error(
                    `GitHub API [${method} ${path}] → 401: webhook credential was rejected. ` +
                    `Configure HOOK_TOKEN with repo webhook-admin access, or replace MIRROR_TOKEN with one that can call the GitHub REST API. ` +
                    `Body: ${JSON.stringify(data)}`
                  );
                }
                throw new Error(`GitHub API [${method} ${path}]: ${JSON.stringify(data)}`);
              }
              return data;
            }

            async function findOrCreateGroup(parentId, groupPath, groupName) {
              const res = await fetch(
                `${GITLAB_HOST}/api/v4/groups/${parentId}/subgroups` +
                `?search=${encodeURIComponent(groupPath)}&per_page=100`,
                { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
              );
              const subgroups = await res.json();
              const existing  = subgroups.find(g => g.path === groupPath || g.name === groupPath);

              if (existing) {
                console.log(`  ✅ Found group  : ${existing.full_path} (id=${existing.id})`);
                return existing;
              }

              console.log(`  ➕ Creating group: ${groupName} under parent ${parentId}`);
              const created = await glFetch("POST", "/groups", {
                name:       groupName,
                path:       groupPath,
                parent_id:  parseInt(parentId),
                visibility: "private"
              });
              console.log(`  ✅ Created group : ${created.full_path} (id=${created.id})`);
              return created;
            }

            // ─── 3. Build nested group hierarchy ──────────────────────────────
            console.log("\nResolving GitLab group hierarchy...");

            const secondLevelPath = tenant ?? ORG_SUBGROUP;
            const secondLevel     = await findOrCreateGroup(TOP_LEVEL_GROUP_ID, secondLevelPath, secondLevelPath);
            const productGroup    = await findOrCreateGroup(secondLevel.id, product, product);
            const aspectGroup     = await findOrCreateGroup(productGroup.id, aspect, aspect);

            // ─── 4. Find or create the project ────────────────────────────────
            console.log(`\nLooking for project '${name}' in ${aspectGroup.full_path}...`);

            const projectsRes = await fetch(
              `${GITLAB_HOST}/api/v4/groups/${aspectGroup.id}/projects` +
              `?search=${encodeURIComponent(name)}&per_page=100`,
              { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
            );
            const projects  = await projectsRes.json();
            const existing  = projects.find(p => p.path === name || p.name === name);

            let projectId, projectUrl;
            let projectDefaultBranch = defaultBranch;

            if (existing) {
              projectId  = existing.id;
              projectUrl = existing.web_url;
              console.log(`Found existing project: ${projectUrl} (id=${projectId})`);

              try {
                const project = await glFetch("GET", `/projects/${projectId}`);
                projectDefaultBranch = project.default_branch ?? defaultBranch;
              } catch (err) {
                core.warning(`Could not read project details: ${err.message}`);
              }

            } else {
              // ── Create a lightweight GitLab project for trigger-only CI ─────
              //
              // The removed ci_cd_only API mode used to create a special
              // "external repository CI" project. We now emulate that model by
              // using a normal GitLab project that stores only CI config while
              // GitHub remains the source of truth for code.
              console.log(`Creating project '${name}' for trigger-only external CI...`);
              const created = await glFetch("POST", "/projects", {
                name,
                path:         name,
                namespace_id: aspectGroup.id,
                visibility:   "private",
                initialize_with_readme: true
              });
              projectId  = created.id;
              projectUrl = created.web_url;
              projectDefaultBranch = created.default_branch ?? defaultBranch;
              console.log(`  Project created: ${projectUrl} (id=${projectId})`);
            }

            console.log(`GitLab default branch: ${projectDefaultBranch}`);

            // ─── 5. Disable pull mirroring if the project used the old fallback ─
            console.log("\nDisabling GitLab pull mirroring for external-CI mode...");
            try {
              const mirrorConfig = await glFetch("GET", `/projects/${projectId}/mirror/pull`);

              if (mirrorConfig?.url) {
                await glFetch("PUT", `/projects/${projectId}/mirror/pull`, {
                  enabled: false,
                  url: mirrorConfig.url
                });
                console.log("  Pull mirroring disabled.");
              } else {
                console.log("  No pull mirroring URL configured; nothing to disable.");
              }
            } catch (err) {
              if (String(err.message).includes("The project is not mirrored")) {
                console.log("  Project is not mirrored; nothing to disable.");
              } else {
                core.warning(`Could not disable pull mirroring: ${err.message}`);
              }
            }

            // ─── 6. Seed GitLab CI config + project variables ─────────────────
            const gitlabCiContent = await fetchCentralFile("templates/.gitlab-ci.yml");

            console.log("\nSeeding GitLab CI configuration...");
            await upsertRepositoryFile(
              projectId,
              projectDefaultBranch,
              ".gitlab-ci.yml",
              gitlabCiContent,
              "chore: sync external CI pipeline template"
            );

            console.log("\nConfiguring GitLab project variables...");
            await upsertProjectVariable(projectId, "EXTERNAL_REPO_FULL_NAME", repoFullName);
            await upsertProjectVariable(projectId, "EXTERNAL_REPO_CLONE_USERNAME", MIRROR_USERNAME);
            try {
              await upsertProjectVariable(projectId, "EXTERNAL_REPO_CLONE_TOKEN", MIRROR_TOKEN, {
                masked: true
              });
            } catch (err) {
              core.warning(
                `Could not mask EXTERNAL_REPO_CLONE_TOKEN automatically: ${err.message}. ` +
                "Retrying without masked=true."
              );
              await upsertProjectVariable(projectId, "EXTERNAL_REPO_CLONE_TOKEN", MIRROR_TOKEN);
            }

            // ─── 7. Create/reuse a GitLab trigger token ───────────────────────
            console.log("\nEnsuring GitLab pipeline trigger token exists...");

            let triggerToken = null;
            try {
              const triggers = await glFetch("GET", `/projects/${projectId}/triggers`);
              const existingTrigger = triggers.find(
                t => t.description === "GitHub webhook trigger" &&
                  typeof t.token === "string" &&
                  t.token.length > 8
              );

              if (existingTrigger) {
                triggerToken = existingTrigger.token;
                console.log("  Reusing existing pipeline trigger token.");
              }
            } catch (err) {
              core.warning(`Could not list existing trigger tokens: ${err.message}`);
            }

            if (!triggerToken) {
              const trigger = await glFormFetch("POST", `/projects/${projectId}/triggers`, {
                description: "GitHub webhook trigger"
              });
              triggerToken = trigger.token;
              console.log("  Pipeline trigger token created.");
            }

            // ─── 8. Create/update the GitHub webhook ourselves ────────────────
            //
            // We send both push and pull_request events so the PR bridge has a
            // fresh GitLab pipeline to track on PR open/reopen/synchronize.
            // GitLab receives the webhook payload as TRIGGER_PAYLOAD, which the
            // seeded .gitlab-ci.yml uses to checkout the exact GitHub ref/SHA.
            console.log("\nSetting up GitHub → GitLab webhook...");

            const webhookBaseUrl = `${GITLAB_HOST}/api/v4/projects/${projectId}/trigger/pipeline`;
            const webhookUrl     = `${webhookBaseUrl}?token=${encodeURIComponent(triggerToken)}`;

            const hooks = await ghFetch("GET", `/repos/${repoFullName}/hooks?per_page=100`);
            const existingHook = hooks.find(
              hook => hook.name === "web" &&
                typeof hook.config?.url === "string" &&
                hook.config.url.startsWith(webhookBaseUrl)
            );

            const hookBody = {
              active: true,
              events: ["push", "pull_request"],
              config: {
                url:          webhookUrl,
                content_type: "json",
                insecure_ssl: "0"
              }
            };

            if (existingHook) {
              await ghFetch("PATCH", `/repos/${repoFullName}/hooks/${existingHook.id}`, hookBody);
              console.log("  GitHub webhook updated.");
            } else {
              await ghFetch("POST", `/repos/${repoFullName}/hooks`, {
                name: "web",
                ...hookBody
              });
              console.log("  GitHub webhook created.");
            }

            console.log(`\nGitLab project : ${projectUrl}`);
            console.log(`Source repo    : https://github.com/${repoFullName}.git`);
            console.log("External CI/CD provisioning complete ✅");
