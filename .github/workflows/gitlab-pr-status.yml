name: GitLab CI Status Bridge

on:
  workflow_call:

permissions:
  contents: read
  statuses: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Relay GitLab pipeline status to this PR commit
        uses: actions/github-script@v7
        env:
          GITLAB_HOST:               ${{ secrets.GITLAB_HOST }}
          GITLAB_API_TOKEN:          ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_TOP_LEVEL_GROUP_ID: ${{ secrets.GITLAB_TOP_LEVEL_GROUP_ID }}
          GITLAB_ORG_SUBGROUP:       ${{ secrets.GITLAB_ORG_SUBGROUP }}
        with:
          script: |
            const GITLAB_HOST        = process.env.GITLAB_HOST;
            const GITLAB_API_TOKEN   = process.env.GITLAB_API_TOKEN;
            const TOP_LEVEL_GROUP_ID = process.env.GITLAB_TOP_LEVEL_GROUP_ID;
            const ORG_SUBGROUP       = process.env.GITLAB_ORG_SUBGROUP;

            const STATUS_CONTEXT   = "gitlab-ci/pipeline";
            const MIRROR_SETTLE_MS = 30_000;
            const POLL_INTERVAL_MS = 20_000;
            const MAX_WAIT_MS      = 30 * 60_000;

            const prSha    = context.payload.pull_request.head.sha;
            const prBranch = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;

            console.log(`PR #${prNumber}  branch=${prBranch}  sha=${prSha}`);

            // ── GitHub commit status helper ────────────────────────────────────
            async function postGitHubStatus(state, description, targetUrl = "") {
              await github.rest.repos.createCommitStatus({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                sha:         prSha,
                state,
                description: description.slice(0, 140),
                context:     STATUS_CONTEXT,
                ...(targetUrl ? { target_url: targetUrl } : {})
              });
              console.log(`  → GitHub status [${state}]: ${description}`);
            }

            // ── GitLab API helper ──────────────────────────────────────────────
            async function glFetch(method, path, body) {
              const res = await fetch(`${GITLAB_HOST}/api/v4${path}`, {
                method,
                headers: {
                  "PRIVATE-TOKEN": GITLAB_API_TOKEN,
                  "Content-Type":  "application/json"
                },
                ...(body ? { body: JSON.stringify(body) } : {})
              });

              if (res.status === 204) return null;

              const data = await res.json();
              if (!res.ok) {
                throw new Error(
                  `GitLab API [${method} ${path}] → ${res.status}: ${JSON.stringify(data)}`
                );
              }
              return data;
            }

            // ── Step 1: Resolve GitLab project from repo topics ────────────────
            const { data: topicData } = await github.rest.repos.getAllTopics({
              owner: context.repo.owner,
              repo:  context.repo.repo
            });

            const topics = topicData.names;

            function extractTopic(prefix) {
              const match = topics.find(t => t.startsWith(`${prefix}-`));
              return match ? match.slice(prefix.length + 1) : null;
            }

            const product = extractTopic("product");
            const aspect  = extractTopic("aspect");
            const name    = extractTopic("repo");
            const tenant  = extractTopic("tenant");

            if (!product || !aspect || !name) {
              const msg = `Cannot resolve GitLab project — missing topics. Found: ${topics.join(", ")}`;
              await postGitHubStatus("error", msg);
              core.setFailed(msg);
              return;
            }

            console.log(`GitLab path: ${tenant ?? ORG_SUBGROUP}/${product}/${aspect}/${name}`);

            async function findSubgroup(parentId, path) {
              const res = await fetch(
                `${GITLAB_HOST}/api/v4/groups/${parentId}/subgroups` +
                `?search=${encodeURIComponent(path)}&per_page=100`,
                { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
              );
              const groups = await res.json();
              return groups.find(g => g.path === path || g.name === path) ?? null;
            }

            const secondLevelPath = tenant ?? ORG_SUBGROUP;
            const secondLevel     = await findSubgroup(TOP_LEVEL_GROUP_ID, secondLevelPath);
            if (!secondLevel) {
              const msg = `GitLab group '${secondLevelPath}' not found.`;
              await postGitHubStatus("error", msg);
              core.setFailed(msg);
              return;
            }

            const productGroup = await findSubgroup(secondLevel.id, product);
            if (!productGroup) {
              const msg = `GitLab group '${product}' not found.`;
              await postGitHubStatus("error", msg);
              core.setFailed(msg);
              return;
            }

            const aspectGroup = await findSubgroup(productGroup.id, aspect);
            if (!aspectGroup) {
              const msg = `GitLab group '${aspect}' not found.`;
              await postGitHubStatus("error", msg);
              core.setFailed(msg);
              return;
            }

            const projRes = await fetch(
              `${GITLAB_HOST}/api/v4/groups/${aspectGroup.id}/projects` +
              `?search=${encodeURIComponent(name)}&per_page=100`,
              { headers: { "PRIVATE-TOKEN": GITLAB_API_TOKEN } }
            );
            const projects  = await projRes.json();
            const glProject = projects.find(p => p.path === name || p.name === name);

            if (!glProject) {
              const msg = `GitLab project '${name}' not found. Has provisioning run yet?`;
              await postGitHubStatus("error", msg);
              core.setFailed(msg);
              return;
            }

            const projectId  = glProject.id;
            const projectUrl = glProject.web_url;
            console.log(`GitLab project: ${projectUrl} (id=${projectId})`);

            // ── Step 2: Post "pending" immediately ────────────────────────────
            await postGitHubStatus(
              "pending",
              "Waiting for GitLab CI pipeline…",
              `${projectUrl}/-/pipelines`
            );

            // ── Step 3: Trigger mirror refresh then explicitly create pipeline ──
            //
            // We do NOT rely on trigger_builds (inconsistently supported on
            // GitLab.com). Instead we:
            //   a) trigger mirror refresh so GitLab fetches the latest commit
            //   b) wait for mirror to settle
            //   c) explicitly create a pipeline for the PR branch via API
            //
            // This is more reliable — we control exactly when the pipeline fires.

            console.log("\nTriggering GitLab mirror refresh...");
            try {
              await glFetch("POST", `/projects/${projectId}/mirror/pull`);
              console.log("  Mirror refresh triggered.");
            } catch (err) {
              core.warning(`Mirror refresh call failed: ${err.message}`);
            }

            console.log(`Waiting ${MIRROR_SETTLE_MS / 1000}s for mirror to settle...`);
            await new Promise(r => setTimeout(r, MIRROR_SETTLE_MS));

            // Explicitly create a pipeline for the PR branch.
            // GitLab will use the latest commit on that ref (which is now our SHA
            // after the mirror synced it).
            console.log(`\nCreating GitLab pipeline for branch '${prBranch}'...`);
            let createdPipeline = null;
            try {
              createdPipeline = await glFetch(
                "POST",
                `/projects/${projectId}/pipeline`,
                { ref: prBranch }
              );
              console.log(`  Pipeline created: #${createdPipeline.id} status=${createdPipeline.status}`);

              await postGitHubStatus(
                "pending",
                `GitLab pipeline #${createdPipeline.id} is ${createdPipeline.status}…`,
                `${projectUrl}/-/pipelines/${createdPipeline.id}`
              );
            } catch (err) {
              // Pipeline creation can fail if the branch doesn't exist in GitLab yet
              // (mirror hasn't synced). Fall through to polling which will also check.
              core.warning(`Explicit pipeline creation failed: ${err.message}. Will poll for any pipeline on this branch.`);
            }

            // ── Step 4: Poll for pipeline matching our exact SHA ───────────────
            const TERMINAL_STATUSES    = new Set(["success", "failed", "canceled", "skipped", "blocked"]);
            const IN_PROGRESS_STATUSES = new Set(["created", "waiting_for_resource", "preparing", "pending", "running"]);

            let pipeline = null;
            let elapsed  = 0;

            // If we created a pipeline, poll it directly by ID for efficiency.
            // If creation failed, fall back to scanning all pipelines for the branch.
            const pollById = createdPipeline?.id ?? null;

            console.log(`\nPolling GitLab for pipeline on '${prBranch}' SHA=${prSha}...`);

            while (elapsed < MAX_WAIT_MS) {
              await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
              elapsed += POLL_INTERVAL_MS;

              try {
                if (pollById) {
                  // Poll the specific pipeline we created
                  const p = await glFetch("GET", `/projects/${projectId}/pipelines/${pollById}`);
                  const pipelineUrl = `${projectUrl}/-/pipelines/${p.id}`;

                  console.log(`  [${Math.round(elapsed / 1000)}s] Pipeline #${p.id} status=${p.status}`);

                  if (IN_PROGRESS_STATUSES.has(p.status)) {
                    await postGitHubStatus(
                      "pending",
                      `GitLab pipeline #${p.id} is ${p.status}…`,
                      pipelineUrl
                    );
                  }

                  if (TERMINAL_STATUSES.has(p.status)) {
                    pipeline = p;
                    console.log(`  Pipeline finished: ${p.status}`);
                    break;
                  }
                } else {
                  // Fallback: scan all pipelines for the branch and match by SHA
                  const pipelines = await glFetch(
                    "GET",
                    `/projects/${projectId}/pipelines` +
                    `?ref=${encodeURIComponent(prBranch)}&per_page=10`
                  );

                  const exact = pipelines.find(p => p.sha === prSha);

                  if (exact) {
                    const pipelineUrl = `${projectUrl}/-/pipelines/${exact.id}`;
                    console.log(`  [${Math.round(elapsed / 1000)}s] Pipeline #${exact.id} status=${exact.status}`);

                    if (IN_PROGRESS_STATUSES.has(exact.status)) {
                      await postGitHubStatus(
                        "pending",
                        `GitLab pipeline #${exact.id} is ${exact.status}…`,
                        pipelineUrl
                      );
                    }

                    if (TERMINAL_STATUSES.has(exact.status)) {
                      pipeline = exact;
                      console.log(`  Pipeline finished: ${exact.status}`);
                      break;
                    }
                  } else {
                    console.log(
                      `  [${Math.round(elapsed / 1000)}s] No pipeline for this SHA yet ` +
                      `(${pipelines.length} recent pipelines for branch).`
                    );
                  }
                }
              } catch (err) {
                core.warning(`Poll failed (will retry): ${err.message}`);
              }
            }

            // ── Step 5: Post final result back to GitHub ───────────────────────
            if (!pipeline) {
              await postGitHubStatus(
                "error",
                "GitLab pipeline did not complete within the timeout.",
                `${projectUrl}/-/pipelines`
              );
              core.setFailed("Timed out waiting for GitLab pipeline.");
              return;
            }

            const pipelineUrl = `${projectUrl}/-/pipelines/${pipeline.id}`;

            const STATUS_MAP = {
              success:  "success",
              failed:   "failure",
              canceled: "failure",
              skipped:  "success",
              blocked:  "pending"
            };

            const ghState = STATUS_MAP[pipeline.status] ?? "error";

            const DESCRIPTIONS = {
              success: `GitLab pipeline #${pipeline.id} passed ✓`,
              failure: `GitLab pipeline #${pipeline.id} failed ✗`,
              pending: `GitLab pipeline #${pipeline.id} requires manual action`,
              error:   `GitLab pipeline #${pipeline.id} ended with unexpected status: ${pipeline.status}`
            };

            await postGitHubStatus(ghState, DESCRIPTIONS[ghState], pipelineUrl);

            if (ghState !== "success" && ghState !== "pending") {
              core.setFailed(`GitLab pipeline ${pipeline.status}. See: ${pipelineUrl}`);
            } else {
              console.log(`\n✅ Done. GitHub commit status set to '${ghState}'.`);
            }